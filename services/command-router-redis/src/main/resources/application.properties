${quarkus.application.properties}
# Prevent OpenTelemetry from replacing Vert.x MetricsOptions with its HTTP-only factory.
# This keeps Micrometer's Vert.x metrics factory active so Redis pool metrics can be registered.
quarkus.micrometer.binder.http-server.enabled=true

# The vert.x Redis client acquires a pooled connection per command, so a burst of
# commands to route (e.g. one Kafka poll batch, each command requiring a cache lookup)
# easily exceeds max-pool-size concurrent Redis commands. Acquisitions beyond
# max-pool-waiting are rejected (ConnectionPoolTooBusyException), failing command
# delivery. A deep wait queue absorbs such bursts, adding only a few milliseconds of
# latency per queued lookup (Quarkus default is 24).
hono.commandRouter.cache.redis.max-pool-waiting=512
